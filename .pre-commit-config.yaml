repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: uv run isort --check-only --diff
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

      - id: black
        name: black
        entry: uv run black --check --diff
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
