repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: uv run isort --check-only --diff
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

      - id: black
        name: black
        entry: uv run black --check --diff
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]

      # The docs are the one thing nothing else tests, and they drift fastest.
      # Checks that backticked symbols resolve, README examples still run, the
      # module map is complete, and dashes are tight. See scripts/check_docs.py.
      - id: docs
        name: docs
        entry: uv run python scripts/check_docs.py
        language: system
        pass_filenames: false
        stages: [pre-push]
